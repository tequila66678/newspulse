services:
  - type: web
    name: newspulse
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./newspulse.db
      - key: JWT_SECRET
        value: newspulse-prod-render-secret
